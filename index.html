<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFT Spin App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.section { display: none; padding: 20px; }
.active { display: block; }

.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1e293b;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.navbar button {
  background: none;
  border: none;
  color: white;
}

.spin-container {
  text-align: center;
}

/* GRID */
.grid {
  width: 240px;
  margin: 20px auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
}

.cell {
  width: 75px;
  height: 75px;
  border-radius: 10px;
  overflow: hidden;
  border: 2px solid #334155;
}

.cell img {
  width: 100%;
  height: 100%;
}

/* ACTIVE SPIN */
.active-cell {
  border: 3px solid yellow;
  transform: scale(1.05);
}

/* WINNER */
.winner {
  border: 3px solid #22c55e !important;
}

/* BUTTON */
.spin-btn {
  padding: 10px 20px;
  font-size: 18px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
}

</style>
</head>

<body>

<!-- SPIN SECTION -->
<div id="spin" class="section active">
  <div class="spin-container">
    <h2>Spin & Win 🎰</h2>

    <div class="grid" id="grid"></div>

    <button class="spin-btn" onclick="startSpin()">Start Spin</button>

    <h3 id="result"></h3>
    <p>Stars: <span id="stars">0</span></p>
  </div>
</div>

<script>
let stars = 0;

/* 👉 TERE GITHUB IMAGES YAHAN DAAL */
const images = [
  "birthday_candle.jpg",
  "daimond.jpg",
  "desk_calendar.jpg",
  "gift.jpg",
  "heart.jpg",
  "icecream.jpg",
  "plush_pepe.jpg",
  "pool.jpg",
  "rocket.jpg"
];

const grid = document.getElementById("grid");

/* GRID CREATE */
images.forEach((img, index) => {
  let div = document.createElement("div");
  div.classList.add("cell");
  div.innerHTML = `<img src="${img}">`;
  div.id = "cell-" + index;
  grid.appendChild(div);
});

/* BORDER PATH (clockwise) */
const path = [0,1,2,5,8,7,6,3];

let spinning = false;

function startSpin() {
  if (spinning) return;

  spinning = true;
  let i = 0;
  let rounds = 20 + Math.floor(Math.random() * 10);

  let interval = setInterval(() => {
    document.querySelectorAll(".cell").forEach(c => c.classList.remove("active-cell"));

    let index = path[i % path.length];
    document.getElementById("cell-" + index).classList.add("active-cell");

    i++;

    if (i > rounds) {
      clearInterval(interval);

      let winIndex = path[(i - 1) % path.length];

      document.querySelectorAll(".cell").forEach(c => c.classList.remove("active-cell"));
      document.getElementById("cell-" + winIndex).classList.add("winner");

      let reward = (winIndex + 1) * 5;
      stars += reward;

      document.getElementById("stars").innerText = stars;
      document.getElementById("result").innerText =
        "🎉 Congratulations! You won " + reward + " stars!";

      spinning = false;
    }

  }, 120);
}
</script>

</body>
</html>
