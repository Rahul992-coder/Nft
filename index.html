<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Easy Gift Clone</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #1e293b;
}

.user {
  display: flex;
  align-items: center;
  gap: 10px;
}

.user img {
  width: 45px;
  border-radius: 50%;
}

.balance {
  background: #0ea5e9;
  padding: 8px 15px;
  border-radius: 20px;
}

.plus {
  margin-left: 10px;
  cursor: pointer;
}

/* SPIN */
.spin-container {
  overflow: hidden;
  padding: 20px;
}

.track {
  display: flex;
  gap: 10px;
  transition: transform 0.3s linear;
}

.card {
  min-width: 120px;
  background: #1e293b;
  border-radius: 15px;
  padding: 10px;
  text-align: center;
}

.card img {
  width: 100%;
}

/* BUTTON */
.spin-btn {
  margin: 20px;
  width: calc(100% - 40px);
  padding: 15px;
  background: #0ea5e9;
  border: none;
  border-radius: 10px;
  font-size: 18px;
}

/* POPUP */
.popup {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  background: #1e293b;
  padding: 20px;
  border-radius: 20px 20px 0 0;
  transition: 0.3s;
}

.popup.show {
  bottom: 0;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

.top-btn {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  background: #0ea5e9;
  border: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="user">
    <img src="https://i.pravatar.cc/100">
    <div>
      <b>Mr Rahul</b><br>
      <small>ID: 12345</small>
    </div>
  </div>

  <div>
    ⭐ <span id="stars">0</span>
    <span class="plus" onclick="openPopup()">➕</span>
  </div>
</div>

<!-- SPIN -->
<div class="spin-container">
  <div class="track" id="track"></div>
</div>

<button class="spin-btn" onclick="spin()">Try Your Luck - 1 ⭐</button>

<h3 id="result" style="text-align:center;"></h3>

<!-- POPUP -->
<div class="popup" id="popup">
  <h2>Top Up Balance</h2>

  <p>⭐ Stars</p>

  <input type="number" id="amount" placeholder="Enter amount">

  <button class="top-btn" onclick="addStars()">Top up with Stars</button>
</div>

<script>
let stars = localStorage.getItem("stars") || 0;
document.getElementById("stars").innerText = stars;

const items = [
  {name:"Gift", img:"gift.jpg"},
  {name:"Heart", img:"heart.jpg"},
  {name:"Rocket", img:"rocket.jpg"},
  {name:"Icecream", img:"icecream.jpg"},
  {name:"Candle", img:"birthday_candle.jpg"},
  {name:"Diamond", img:"daimond.jpg"}
];

const track = document.getElementById("track");

/* CREATE LOOP TRACK */
for(let i=0;i<20;i++){
  items.forEach(item=>{
    let div = document.createElement("div");
    div.className="card";
    div.innerHTML=`<img src="${item.img}"><br>${item.name}`;
    track.appendChild(div);
  });
}

let pos = 0;

function spin(){
  if(stars <= 0){
    alert("Add funds first!");
    return;
  }

  stars--;
  save();

  let speed = 20;
  let total = Math.floor(Math.random()*3000)+3000;

  let interval = setInterval(()=>{
    pos -= speed;
    track.style.transform = `translateX(${pos}px)`;
  },20);

  setTimeout(()=>{
    clearInterval(interval);

    let cards = document.querySelectorAll(".card");
    let centerIndex = Math.floor((Math.abs(pos)+150)/130);

    let win = cards[centerIndex % items.length];
    let text = win.innerText;

    stars += 5;
    save();

    document.getElementById("result").innerText =
      "🎉 You won " + text;

  }, total);
}

function openPopup(){
  document.getElementById("popup").classList.add("show");
}

function addStars(){
  let val = parseInt(document.getElementById("amount").value);
  if(!val) return;

  stars += val;
  save();

  alert("Demo added");

  document.getElementById("popup").classList.remove("show");
}

function save(){
  localStorage.setItem("stars", stars);
  document.getElementById("stars").innerText = stars;
}
</script>

</body>
</html>
