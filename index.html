<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spin App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#1e293b;
}

.user{
  display:flex;
  align-items:center;
  gap:10px;
}

.user img{
  width:45px;
  border-radius:50%;
}

/* NAVBAR */
.navbar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1e293b;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.navbar button{
  background:none;
  border:none;
  color:white;
}

/* SECTION */
.section{display:none;}
.active{display:block;}

/* SPIN */
.spin-container{
  overflow:hidden;
  padding:20px;
  position:relative;
}

.spin-container::after{
  content:"";
  position:absolute;
  left:50%;
  top:0;
  transform:translateX(-50%);
  width:3px;
  height:100%;
  background:yellow;
}

.track{display:flex;gap:10px;}

.card{
  min-width:120px;
  background:#1e293b;
  border-radius:15px;
  padding:10px;
  text-align:center;
}

.card img{width:100%;}

/* BUTTON */
.btn{
  margin:20px;
  padding:15px;
  width:90%;
  background:#0ea5e9;
  border:none;
  border-radius:10px;
}

/* POPUP */
.popup{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  background:#1e293b;
  padding:20px;
  transition:0.3s;
}

.popup.show{bottom:0;}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
}

/* PROFILE GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="user">
    <img id="pic" src="https://i.pravatar.cc/100">
    <div>
      <b id="name">User</b><br>
      <small id="uid">ID</small>
    </div>
  </div>
  ⭐ <span id="stars">0</span>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="spin-container">
    <div class="track" id="track"></div>
  </div>
  <button class="btn" onclick="spin()">Spin - 1 ⭐</button>
  <h3 id="result"></h3>
</div>

<!-- TASKS -->
<div id="tasks" class="section">
  <h2 style="padding:10px;">Tasks</h2>
  <div id="taskList"></div>
</div>

<!-- ADD FUNDS -->
<div id="funds" class="section">
  <button class="btn" onclick="openPopup()">Add Stars</button>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
  <h2 style="padding:10px;">My Items</h2>
  <div class="grid" id="inventory"></div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <h2>Add Funds</h2>
  <input type="number" id="amount">
  <button class="btn" onclick="addFunds()">Add</button>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <button onclick="show('home')">Home</button>
  <button onclick="show('funds')">Add Funds</button>
  <button onclick="show('tasks')">Tasks</button>
  <button onclick="show('profile')">Profile</button>
</div>

<script>
/* USER */
let userName="Rahul", userId="12345", userPhoto="https://i.pravatar.cc/100";

if(window.Telegram){
  let u=Telegram.WebApp.initDataUnsafe.user;
  if(u){
    userName=u.first_name;
    userId=u.id;
    if(u.photo_url) userPhoto=u.photo_url;
  }
}

name.innerText=userName;
uid.innerText="ID: "+userId;
pic.src=userPhoto;

/* BALANCE */
let stars=parseInt(localStorage.getItem("stars"))||0;
starsEl=document.getElementById("stars");
update();

/* ITEMS */
const items=[
{name:"Gift",img:"gift.jpg"},
{name:"Heart",img:"heart.jpg"},
{name:"Rocket",img:"rocket.jpg"},
{name:"Icecream",img:"icecream.jpg"}
];

const track=document.getElementById("track");

/* TRACK */
for(let i=0;i<20;i++){
 items.forEach(it=>{
  let d=document.createElement("div");
  d.className="card";
  d.innerHTML=`<img src="${it.img}"><br>${it.name}`;
  track.appendChild(d);
 });
}

let pos=0;

/* INVENTORY */
let inventory=JSON.parse(localStorage.getItem("inv"))||[];

/* SPIN */
function spin(){
 if(stars<=0){alert("Add funds");return;}
 stars--;update();

 let inter=setInterval(()=>{
  pos-=25;
  track.style.transform=`translateX(${pos}px)`;
 },20);

 setTimeout(()=>{
  clearInterval(inter);

  let center=Math.abs(pos)+window.innerWidth/2;
  let index=Math.floor(center/130);

  let cards=document.querySelectorAll(".card");
  let win=cards[index];

  let name=win.innerText;

  document.getElementById("result").innerText="🎉 You won "+name;

  inventory.push(name);
  localStorage.setItem("inv",JSON.stringify(inventory));
  loadInv();

  /* ADMIN MSG */
  fetch(`https://api.telegram.org/bot8689903337:AAEynwRuozn5np9Xj5M1zr_RIYwWkWULP6U/sendMessage?chat_id=6667476799&text=${encodeURIComponent("User "+userName+" won "+name)}`);

 },3000);
}

/* TASKS */
const tasks=[
 {name:"Join Channel 1",reward:2},
 {name:"Join Channel 2",reward:3}
];

function loadTasks(){
 let div=document.getElementById("taskList");
 div.innerHTML="";
 tasks.forEach((t,i)=>{
  let done=localStorage.getItem("task"+i);
  let b=document.createElement("button");
  b.className="btn";
  b.innerText=done?"Done":"Do Task +"+t.reward;
  b.onclick=()=>{
    if(done) return;
    stars+=t.reward;
    localStorage.setItem("task"+i,true);
    update();
    loadTasks();
  };
  div.appendChild(b);
 });
}
loadTasks();

/* INVENTORY LOAD */
function loadInv(){
 let div=document.getElementById("inventory");
 div.innerHTML="";
 inventory.forEach(n=>{
  let d=document.createElement("div");
  d.className="card";
  d.innerText=n;
  div.appendChild(d);
 });
}
loadInv();

/* FUNDS */
function addFunds(){
 let val=parseInt(amount.value);
 if(!val)return;
 stars+=val;
 update();
 popup.classList.remove("show");
}

/* UPDATE */
function update(){
 localStorage.setItem("stars",stars);
 starsEl.innerText=stars;
}

/* NAV */
function show(id){
 document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function openPopup(){
 popup.classList.add("show");
}
</script>

</body>
</html>
