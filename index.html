<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFT Spin App</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}.container { padding-bottom: 70px; }

.section { display: none; padding: 20px; }

.active { display: block; }

.navbar { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 10px 0; }

.navbar button { background: none; border: none; color: white; font-size: 14px; }

.spin-container { text-align: center; }

.spin-box { margin: 30px auto; width: 200px; height: 200px; border-radius: 50%; overflow: hidden; border: 5px solid white; }

.spin-box img { width: 100%; height: 100%; }

button.spin-btn { padding: 10px 20px; font-size: 18px; background: #22c55e; border: none; border-radius: 10px; }

.nft-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

.nft-card { background: #1e293b; padding: 10px; border-radius: 10px; text-align: center; }

.profile-box { text-align: center; } </style>

</head>
<body><div class="container">  <!-- NFTs Section -->  <div id="nfts" class="section active">
    <h2>NFTs</h2>
    <div class="nft-grid">
      <div class="nft-card">NFT 1</div>
      <div class="nft-card">NFT 2</div>
      <div class="nft-card">NFT 3</div>
      <div class="nft-card">NFT 4</div>
    </div>
  </div>  <!-- My NFTs -->  <div id="myNfts" class="section">
    <h2>My NFTs</h2>
    <p>No NFTs yet</p>
  </div>  <!-- Spin -->  <div id="spin" class="section">
    <div class="spin-container">
      <h2>Spin & Win</h2>
      <div class="spin-box">
        <img id="spinImage" src="https://via.placeholder.com/200">
      </div>
      <button class="spin-btn" onclick="spinNFT()">Start Spin</button>
      <p id="result"></p>
    </div>
  </div>  <!-- Extra Tab -->  <div id="extra" class="section">
    <h2>More</h2>
  </div>  <!-- Profile -->  <div id="profile" class="section">
    <div class="profile-box">
      <h2>Profile</h2>
      <p>Name: User</p>
      <p>Stars: <span id="stars">0</span></p>
    </div>
  </div></div><!-- Bottom Navbar --><div class="navbar">
  <button onclick="showSection('nfts')">NFTs</button>
  <button onclick="showSection('myNfts')">My NFTs</button>
  <button onclick="showSection('spin')">Spin</button>
  <button onclick="showSection('extra')">More</button>
  <button onclick="showSection('profile')">Profile</button>
</div><script>
let stars = 0;

const nftImages = [
  "https://picsum.photos/200?1",
  "https://picsum.photos/200?2",
  "https://picsum.photos/200?3",
  "https://picsum.photos/200?4",
  "https://picsum.photos/200?5"
];

function showSection(id) {
  document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function spinNFT() {
  let count = 0;
  let spinInterval = setInterval(() => {
    let random = Math.floor(Math.random() * nftImages.length);
    document.getElementById('spinImage').src = nftImages[random];
    count++;

    if (count > 15) {
      clearInterval(spinInterval);
      let winIndex = Math.floor(Math.random() * nftImages.length);
      document.getElementById('spinImage').src = nftImages[winIndex];

      let earned = (winIndex + 1) * 10;
      stars += earned;

      document.getElementById('result').innerText = "You won " + earned + " stars!";
      document.getElementById('stars').innerText = stars;
    }
  }, 100);
}
</script></body>
  </html>
