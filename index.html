<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Easy Gift Clone</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#1e293b;
}

.user{display:flex;gap:10px;align-items:center;}
.user img{width:45px;border-radius:50%;}

/* NAV */
.navbar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1e293b;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

/* SECTIONS */
.section{display:none;}
.active{display:block;}

/* SPIN */
.spin-container{
  overflow:hidden;
  position:relative;
  padding:20px;
}

.spin-container::after{
  content:"";
  position:absolute;
  left:50%;
  width:3px;
  height:100%;
  background:yellow;
}

.track{display:flex;gap:10px;}

.card{
  min-width:120px;
  background:#1e293b;
  border-radius:15px;
  padding:10px;
  text-align:center;
}

.card img{width:100%;}

/* BUTTON */
.btn{
  width:90%;
  margin:20px;
  padding:15px;
  background:#0ea5e9;
  border:none;
  border-radius:10px;
}

/* TASKS */
.task{
  background:#334155;
  margin:10px;
  padding:15px;
  border-radius:15px;
  display:flex;
  justify-content:space-between;
}

/* POPUP */
.popup{
  position:fixed;
  bottom:-100%;
  width:100%;
  background:#1e293b;
  padding:20px;
  transition:.3s;
}

.popup.show{bottom:0;}

input{width:100%;padding:10px;margin-top:10px;}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="user">
    <img id="pic" src="https://i.pravatar.cc/100">
    <div>
      <b id="name">User</b><br>
      <small id="uid">ID</small>
    </div>
  </div>
  ⭐ <span id="stars">0</span>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="spin-container">
    <div class="track" id="track"></div>
  </div>
  <button class="btn" onclick="spin()">Spin - 1 ⭐</button>
  <h3 id="result"></h3>
</div>

<!-- TASKS -->
<div id="tasks" class="section">
  <h2 style="padding:10px;">Tasks</h2>
  <div id="taskList"></div>
</div>

<!-- FUNDS -->
<div id="funds" class="section">
  <button class="btn" onclick="openPopup()">Add Funds</button>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
  <h2 style="padding:10px;">My Items</h2>
  <div id="inv"></div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div style="display:flex;justify-content:space-between;">
    <h2>Add Funds</h2>
    <span onclick="closePopup()">❌</span>
  </div>
  <input id="amount" type="number">
  <button class="btn" onclick="addFunds()">Add</button>
</div>

<!-- NAV -->
<div class="navbar">
  <button onclick="show('home')">Home</button>
  <button onclick="show('tasks')">Tasks</button>
  <button onclick="show('funds')">Funds</button>
  <button onclick="show('profile')">Profile</button>
</div>

<script>
/* USER */
let userName="Rahul", userId="12345";

if(window.Telegram){
 let u=Telegram.WebApp.initDataUnsafe.user;
 if(u){userName=u.first_name;userId=u.id;}
}

name.innerText=userName;
uid.innerText="ID:"+userId;

/* BALANCE */
let stars=parseInt(localStorage.getItem("stars"))||0;
update();

/* ITEMS */
const items=[
{name:"Gift",img:"gift.jpg"},
{name:"Heart",img:"heart.jpg"},
{name:"Rocket",img:"rocket.jpg"}
];

const track=document.getElementById("track");

/* CREATE */
for(let i=0;i<20;i++){
 items.forEach(it=>{
  let d=document.createElement("div");
  d.className="card";
  d.innerHTML=`<img src="${it.img}"><br>${it.name}`;
  track.appendChild(d);
 });
}

let pos=0;

/* SPIN */
function spin(){
 if(stars<=0){alert("Add funds");return;}

 stars--;update();

 let inter=setInterval(()=>{
  pos-=25;
  track.style.transform=`translateX(${pos}px)`;
 },20);

 setTimeout(()=>{
  clearInterval(inter);

  let cards=document.querySelectorAll(".card");
  let center=window.innerWidth/2;

  let win, min=9999;

  cards.forEach(c=>{
    let r=c.getBoundingClientRect();
    let diff=Math.abs(center-(r.left+r.width/2));
    if(diff<min){min=diff;win=c;}
  });

  cards.forEach(c=>c.style.border="none");
  win.style.border="3px solid yellow";

  let name=win.innerText;
  result.innerText="🎉 You won "+name;

  // SAVE
  let inv=JSON.parse(localStorage.getItem("inv"))||[];
  inv.push(name);
  localStorage.setItem("inv",JSON.stringify(inv));
  loadInv();

  // ADMIN MSG
  fetch(`https://api.telegram.org/bot8689903337:AAEynwRuozn5np9Xj5M1zr_RIYwWkWULP6U/sendMessage?chat_id=6667476799&text=${encodeURIComponent(userName+" won "+name)}`);

 },3000);
}

/* TASKS */
const tasks=[
{title:"Join Channel",reward:2,link:"https://t.me/YOUR_CHANNEL"},
{title:"Join Group",reward:1,link:"https://t.me/YOUR_GROUP"}
];

function loadTasks(){
 taskList.innerHTML="";
 tasks.forEach((t,i)=>{
  let done=localStorage.getItem("t"+i);

  let d=document.createElement("div");
  d.className="task";
  d.innerHTML=`
    <div>${t.title}</div>
    <button>${done?"Done":"+"+t.reward+"⭐"}</button>
  `;

  d.onclick=()=>{
    if(done)return;
    window.open(t.link);
    stars+=t.reward;
    localStorage.setItem("t"+i,true);
    update();
    loadTasks();
  };

  taskList.appendChild(d);
 });
}
loadTasks();

/* INVENTORY */
function loadInv(){
 let inv=JSON.parse(localStorage.getItem("inv"))||[];
 let d=document.getElementById("inv");
 d.innerHTML="";
 inv.forEach(i=>{
  let el=document.createElement("div");
  el.innerText=i;
  d.appendChild(el);
 });
}
loadInv();

/* FUNDS */
function addFunds(){
 let v=parseInt(amount.value);
 if(!v)return;
 stars+=v;
 update();
 closePopup();
}

function update(){
 localStorage.setItem("stars",stars);
 starsEl.innerText=stars;
}

/* NAV */
function show(id){
 document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

/* POPUP */
function openPopup(){popup.classList.add("show");}
function closePopup(){popup.classList.remove("show");}
</script>

</body>
</html>
