<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Easy Gift Clone</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: #1e293b;
}

.user {
  display: flex;
  align-items: center;
  gap: 10px;
}

.user img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
}

.balance {
  background: #0ea5e9;
  padding: 8px 15px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.plus {
  background: white;
  color: black;
  padding: 2px 8px;
  border-radius: 50%;
  cursor: pointer;
}

/* SPIN GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 20px;
}

.cell {
  background: #1e293b;
  border-radius: 10px;
  padding: 10px;
}

.cell img {
  width: 100%;
}

/* BUTTON */
.spin-btn {
  margin: 20px;
  width: calc(100% - 40px);
  padding: 15px;
  background: #0ea5e9;
  border: none;
  border-radius: 10px;
  font-size: 18px;
}

.active {
  border: 3px solid yellow;
}

.win {
  border: 3px solid green;
}

/* POPUP */
.popup {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  background: #1e293b;
  padding: 20px;
  transition: 0.3s;
}

.popup.show {
  bottom: 0;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="user">
    <img src="https://i.pravatar.cc/100">
    <div>
      <b id="name">Rahul</b><br>
      <small id="userid">ID: 12345</small>
    </div>
  </div>

  <div class="balance">
    ⭐ <span id="stars">0</span>
    <div class="plus" onclick="openPopup()">+</div>
  </div>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<button class="spin-btn" onclick="spin()">Try Your Luck - 1 ⭐</button>

<h3 id="result" style="text-align:center;"></h3>

<!-- POPUP -->
<div class="popup" id="popup">
  <h3>Add Stars</h3>
  <input type="number" id="amount" placeholder="Enter stars">
  <button onclick="addStars()">Add</button>
</div>

<script>
let stars = localStorage.getItem("stars") || 0;
document.getElementById("stars").innerText = stars;

const images = [
  "birthday_candle.jpg",
  "daimond.jpg",
  "desk_calendar.jpg",
  "gift.jpg",
  "heart.jpg",
  "icecream.jpg",
  "plush_pepe.jpg",
  "pool.jpg",
  "rocket.jpg"
];

const grid = document.getElementById("grid");

images.forEach((img, i) => {
  let div = document.createElement("div");
  div.className = "cell";
  div.id = "c"+i;
  div.innerHTML = `<img src="${img}">`;
  grid.appendChild(div);
});

const path = [0,1,2,5,8,7,6,3];

function spin() {
  if (stars <= 0) {
    alert("Add funds first!");
    return;
  }

  stars--;
  save();

  let i = 0;
  let rounds = 20;

  let inter = setInterval(() => {
    document.querySelectorAll(".cell").forEach(c=>c.classList.remove("active"));

    let index = path[i % path.length];
    document.getElementById("c"+index).classList.add("active");

    i++;

    if (i > rounds) {
      clearInterval(inter);

      let win = path[(i-1)%path.length];
      document.getElementById("c"+win).classList.add("win");

      let reward = (win+1)*5;
      stars += reward;
      save();

      document.getElementById("result").innerText =
        "🎉 Congratulations! +" + reward + " stars";
    }

  }, 120);
}

function openPopup(){
  document.getElementById("popup").classList.add("show");
}

function addStars(){
  let val = parseInt(document.getElementById("amount").value);
  if(!val) return;

  // ⚠️ FAKE ADD (REAL PAYMENT BACKEND SE HOGA)
  stars += val;
  save();

  alert("Demo: Stars added!");

  document.getElementById("popup").classList.remove("show");
}

function save(){
  localStorage.setItem("stars", stars);
  document.getElementById("stars").innerText = stars;
}
</script>

</body>
</html>
