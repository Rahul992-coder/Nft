<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spin App</title>

<!-- ✅ TELEGRAM WEBAPP -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#1e293b;
}

.user{
  display:flex;
  align-items:center;
  gap:10px;
}

.user img{
  width:45px;
  border-radius:50%;
}

.balance{
  background:#0ea5e9;
  padding:8px 15px;
  border-radius:20px;
  cursor:pointer;
}

/* SPIN */
.spin-container{
  overflow:hidden;
  padding:20px;
  position:relative;
}

.spin-container::after{
  content:"";
  position:absolute;
  left:50%;
  top:0;
  transform:translateX(-50%);
  width:3px;
  height:100%;
  background:yellow;
}

.track{
  display:flex;
  gap:10px;
}

.card{
  min-width:120px;
  background:#1e293b;
  border-radius:15px;
  padding:10px;
  text-align:center;
}

.card img{
  width:100%;
}

/* BUTTON */
.spin-btn{
  margin:20px;
  width:calc(100% - 40px);
  padding:15px;
  background:#0ea5e9;
  border:none;
  border-radius:10px;
  font-size:18px;
}

/* POPUP */
.popup{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  background:#1e293b;
  padding:20px;
  border-radius:20px 20px 0 0;
  transition:0.3s;
}

.popup.show{
  bottom:0;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

.btn{
  width:100%;
  padding:15px;
  margin-top:15px;
  background:#0ea5e9;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="user">
    <img id="profilePic" src="https://i.pravatar.cc/100">
    <div>
      <b id="name">User</b><br>
      <small id="uid">ID: --</small>
    </div>
  </div>

  <div class="balance" onclick="openPopup()">
    ⭐ <span id="stars">0</span> +
  </div>
</div>

<!-- SPIN -->
<div class="spin-container">
  <div class="track" id="track"></div>
</div>

<button class="spin-btn" onclick="spin()">Spin - 1 ⭐</button>

<h3 id="result" style="text-align:center;"></h3>

<!-- POPUP -->
<div class="popup" id="popup">
  <h2>Add Funds</h2>
  <input type="number" id="amount" placeholder="Enter stars">
  <button class="btn" onclick="addFunds()">Add</button>
</div>

<script>
/* ✅ TELEGRAM USER FETCH */
let userName = "Rahul";
let userId = "12345";
let userPhoto = "https://i.pravatar.cc/100";

if(window.Telegram && Telegram.WebApp){
  const tg = Telegram.WebApp;
  const user = tg.initDataUnsafe?.user;

  if(user){
    userName = user.first_name || "User";
    userId = user.id || "0";
    if(user.photo_url){
      userPhoto = user.photo_url;
    }
  }
}

/* APPLY USER DATA */
document.getElementById("name").innerText = userName;
document.getElementById("uid").innerText = "ID: " + userId;
document.getElementById("profilePic").src = userPhoto;

/* BALANCE */
let stars = parseInt(localStorage.getItem("stars")) || 0;
updateStars();

/* ITEMS */
const items = [
  {name:"Gift", img:"gift.jpg"},
  {name:"Heart", img:"heart.jpg"},
  {name:"Rocket", img:"rocket.jpg"},
  {name:"Icecream", img:"icecream.jpg"},
  {name:"Candle", img:"birthday_candle.jpg"},
  {name:"Diamond", img:"daimond.jpg"}
];

const track = document.getElementById("track");

/* CREATE TRACK */
for(let i=0;i<20;i++){
  items.forEach(item=>{
    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<img src="${item.img}"><br>${item.name}`;
    track.appendChild(div);
  });
}

let pos = 0;
let spinning = false;

/* SPIN */
function spin(){
  if(spinning) return;

  if(stars <= 0){
    alert("Add funds first!");
    return;
  }

  spinning = true;
  stars--;
  updateStars();

  let speed = 30;
  let duration = 3000 + Math.random()*2000;

  let inter = setInterval(()=>{
    pos -= speed;
    track.style.transform = `translateX(${pos}px)`;
  },20);

  setTimeout(()=>{
    clearInterval(inter);

    const container = document.querySelector(".spin-container");
    const cardWidth = 130;

    let center = Math.abs(pos) + container.offsetWidth/2;
    let index = Math.floor(center / cardWidth);

    let cards = document.querySelectorAll(".card");
    let winCard = cards[index];

    cards.forEach(c=>c.style.border="none");
    winCard.style.border="3px solid #22c55e";

    let winName = winCard.innerText;

    document.getElementById("result").innerText =
      "🎉 You won " + winName;

    /* 🔔 ADMIN MESSAGE */
    let BOT_TOKEN = "8608797876:AAF-RKV52vT8sd0FDrYj4avkb7n8zVWurjs";
    let CHAT_ID = "6667476799";

    let text =
    "🎰 Spin Result\n\n" +
    "👤 User: " + userName + "\n" +
    "🆔 ID: " + userId + "\n" +
    "🎁 Won: " + winName;

    fetch("https://api.telegram.org/bot"+BOT_TOKEN+
    "/sendMessage?chat_id="+CHAT_ID+
    "&text="+encodeURIComponent(text));

    spinning = false;

  }, duration);
}

/* ADD FUNDS */
function addFunds(){
  let val = parseInt(document.getElementById("amount").value);
  if(!val) return;

  stars += val;
  updateStars();

  alert("Funds added");
  document.getElementById("popup").classList.remove("show");
}

function updateStars(){
  localStorage.setItem("stars", stars);
  document.getElementById("stars").innerText = stars;
}

/* UI */
function openPopup(){
  document.getElementById("popup").classList.add("show");
}
</script>

</body>
</html>
