<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spin App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial}

/* HEADER */
.header{display:flex;justify-content:space-between;padding:15px;background:#1e293b}
.user{display:flex;align-items:center;gap:10px}
.user img{width:45px;border-radius:50%}

/* NAVBAR */
.navbar{
 position:fixed;
 bottom:15px;
 left:50%;
 transform:translateX(-50%);
 width:95%;
 background:#1e293b;
 display:flex;
 justify-content:space-around;
 padding:15px;
 border-radius:20px;
}
.navbar button{background:none;border:none;color:white;font-size:16px;font-weight:bold}

/* SECTION */
.section{display:none}
.active{display:block}

/* SPIN */
.spin-container{overflow:hidden;padding:20px;position:relative}
.center-box{
 position:absolute;
 top:50%;left:50%;
 transform:translate(-50%,-50%);
 width:130px;height:150px;
 border:3px solid yellow;
 border-radius:12px;
}

.track{display:flex;gap:10px;transition:.5s}
.card{
 min-width:120px;
 background:#1e293b;
 border-radius:15px;
 padding:10px;
 text-align:center;
}
.card img{
 width:90px;height:90px;
 object-fit:contain;
 display:block;margin:auto;
}

/* BUTTON */
.btn{
 margin:15px auto;
 padding:20px;
 width:94%;
 background:#0ea5e9;
 border:none;
 border-radius:12px;
 font-size:18px;
}

/* TASK */
.task{background:#1e293b;margin:10px;padding:15px;border-radius:12px}

/* POPUP CENTER FIX */
.popup{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.7);
 display:none;
 align-items:center;
 justify-content:center;
}

.popup.show{
 display:flex;
}

.popup-box{
 background:#1e293b;
 padding:25px;
 border-radius:15px;
 width:85%;
 text-align:center;
 position:relative;
}

.popup-box input{
 width:100%;
 padding:15px;
 margin-top:15px;
 font-size:18px;
 border-radius:10px;
 border:none;
}

/* CLOSE BUTTON */
.close{
 position:absolute;
 right:15px;
 top:10px;
 font-size:22px;
 cursor:pointer;
}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="user">
    <img id="pic">
    <div>
      <b id="name">User</b><br>
      <small id="uid">ID</small>
    </div>
  </div>
  ⭐ <span id="stars">0</span>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="spin-container">
    <div class="track" id="track"></div>
    <div class="center-box"></div>
  </div>

  <button class="btn" onclick="spin()">Spin - 1 ⭐</button>
  <h3 id="result" style="text-align:center;"></h3>
</div>

<!-- TASKS -->
<div id="tasks" class="section">
  <h2 style="padding:10px;">Tasks</h2>
  <div id="taskList"></div>
</div>

<!-- FUNDS -->
<div id="funds" class="section">
  <button class="btn" onclick="openPopup()">Add Stars</button>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
  <h2 style="padding:10px;">My Items</h2>
  <div class="grid" id="inventory"></div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <span class="close" onclick="closePopup()">❌</span>
    <h2>Add Stars</h2>
    <input type="number" id="amount" placeholder="Enter amount">
    <button class="btn" onclick="addFunds()">Add</button>
  </div>
</div>

<!-- NAV -->
<div class="navbar">
  <button onclick="show('home')">Home</button>
  <button onclick="show('funds')">Add Funds</button>
  <button onclick="show('tasks')">Tasks</button>
  <button onclick="show('profile')">Profile</button>
</div>

<script>
/* TELEGRAM USER */
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

let userName="User", userId="0", userPhoto="https://i.pravatar.cc/100", username="NoUsername";

const user = tg.initDataUnsafe?.user;

if(user){
 userName=user.first_name||"User";
 userId=user.id||"0";
 userPhoto=user.photo_url||userPhoto;
 username=user.username ? "@"+user.username : "NoUsername";
}

name.innerText=userName;
uid.innerText="ID: "+userId;
pic.src=userPhoto;
 /* ADMIN */
const BOT_TOKEN= "8689903337:AAEynwRuozn5np9Xj5M1zr_RIYwWkWULP6U";
const ADMIN_ID="6667476799";

/* DATA */
let stars=parseInt(localStorage.getItem("stars"))||0;
let inventory=JSON.parse(localStorage.getItem("inv"))||[];

/* ITEMS */
const items=[
 {name:"Gift",img:"gift.jpg"},
 {name:"Heart",img:"heart.jpg"},
 {name:"Rocket",img:"rocket.jpg"},
 {name:"Ice Cream",img:"icecream.jpg"},
 {name:"Birthday Candle",img:"birthday_candle.jpg"},
 {name:"Daimond",img:"daimond.jpg"},
 {name:"Desk Calendar",img:"desk_calendar.jpg"},
 {name:"Plush Pepe",img:"plush_pepe.jpg"},
 {name:"Float Pool",img:"pool.jpg"},
 {name:"Rose",img:"rose.jpg"},
 {name:"Socks",img:"socks.jpg"},
 {name:"Teddy",img:"teddy.jpg"},
 {name:"Victory Medal",img:"victory_medal.jpg"},
 {name:"Cigar",img:"vintage_cigar.jpg"}
];

const track=document.getElementById("track");

/* BUILD TRACK */
for(let i=0;i<30;i++){
 items.forEach(it=>{
  let d=document.createElement("div");
  d.className="card";
  d.innerHTML=<img src="${it.img}"><br>${it.name};
  track.appendChild(d);
 });
}

/* SPIN */
function spin(){
 if(stars<=0){alert("Add funds");return;}
 stars--;update();

 let cards=document.querySelectorAll(".card");
 let index=Math.floor(cards.length/2)+Math.floor(Math.random()*10);

 let move=-(index*130)+(window.innerWidth/2-65);
 track.style.transform=translateX(${move}px);

 setTimeout(()=>{
  let win=cards[index].innerText;

  result.innerText="🎉 Congratulations! You won "+win;

  inventory.push(win);
  localStorage.setItem("inv",JSON.stringify(inventory));
  loadInv();

  let msg=🎉 NEW WIN

Name: ${userName}
ID: ${userId}
Username: ${username}
Won: ${win};

  fetch(https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(msg)});

 },500);
}

/* TASKS */
const tasks=[
 {name:"Join Channel 1",reward:2,link:"https://t.me/rahul_bot_payout"},
 {name:"Join Channel 2",reward:3,link:"https://t.me/freebotandcodes"}
];

function loadTasks(){
 let div=document.getElementById("taskList");
 div.innerHTML="";
 tasks.forEach((t,i)=>{
  let done=localStorage.getItem("task"+i);

  let d=document.createElement("div");
  d.className="task";

  d.innerHTML=
  <b>${t.name}</b><br><br>
  <button class="btn">${done?"Done":"Join +"+t.reward}</button>
  ;

  d.querySelector("button").onclick=()=>{
    if(done)return;
    window.open(t.link);
    stars+=t.reward;
    localStorage.setItem("task"+i,true);
    update();
    loadTasks();
  };

  div.appendChild(d);
 });
}
loadTasks();

/* INVENTORY */
function loadInv(){
 let div=document.getElementById("inventory");
 div.innerHTML="";
 inventory.forEach(n=>{
  let d=document.createElement("div");
  d.className="card";
  d.innerText=n;
  div.appendChild(d);
 });
}
loadInv();

/* FUNDS */
function addFunds(){
 let val=parseInt(amount.value);
 if(!val)return;
 stars+=val;
 update();
 closePopup();
}

/* UPDATE */
function update(){
 localStorage.setItem("stars",stars);
 starsEl.innerText=stars;
}
let starsEl=document.getElementById("stars");
update();

/* NAV */
function show(id){
 document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

/* POPUP */
function openPopup(){popup.classList.add("show")}
function closePopup(){popup.classList.remove("show")}
</script>

</body>
</html>
